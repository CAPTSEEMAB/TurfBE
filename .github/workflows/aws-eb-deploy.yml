name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: ap-south-1                    # Change to your preferred region
  EB_APPLICATION_NAME: turf-backend         # Your EB application name
  EB_ENVIRONMENT_NAME: turf-backend-env     # Your EB environment name
  S3_BUCKET_NAME: turfBackend-290620  # S3 bucket (globally unique)

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create deployment package
        run: |
          # Create a zip file excluding unnecessary files
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "*.env.local" \
            -x "*.env.prod" \
            -x "tests/*" \
            -x "*.md" \
            -x ".vscode/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket if not exists
        run: |
          if ! aws s3api head-bucket --bucket ${{ env.S3_BUCKET_NAME }} 2>/dev/null; then
            aws s3api create-bucket \
              --bucket ${{ env.S3_BUCKET_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }} || true
          fi
          echo "S3 bucket ready"

      - name: Upload to S3
        run: |
          VERSION_LABEL="ver-${{ github.sha }}-$(date +%Y%m%d%H%M%S)"
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV
          aws s3 cp deploy.zip s3://${{ env.S3_BUCKET_NAME }}/$VERSION_LABEL.zip

      - name: Create Elastic Beanstalk Application (if not exists)
        run: |
          aws elasticbeanstalk describe-applications \
            --application-names ${{ env.EB_APPLICATION_NAME }} \
            --query 'Applications[0].ApplicationName' \
            --output text 2>/dev/null || \
          aws elasticbeanstalk create-application \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --description "Turf Booking Backend API"

      - name: Create Application Version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --version-label ${{ env.VERSION_LABEL }} \
            --source-bundle S3Bucket=${{ env.S3_BUCKET_NAME }},S3Key=${{ env.VERSION_LABEL }}.zip \
            --description "Deployment from GitHub commit ${{ github.sha }}"

      - name: Check if Environment Exists
        id: check-env
        run: |
          ENV_EXISTS=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-names ${{ env.EB_ENVIRONMENT_NAME }} \
            --query 'Environments[?Status!=`Terminated`].EnvironmentName' \
            --output text 2>/dev/null || echo "")
          if [ -z "$ENV_EXISTS" ]; then
            echo "env_exists=false" >> $GITHUB_OUTPUT
          else
            echo "env_exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Environment (if not exists)
        if: steps.check-env.outputs.env_exists == 'false'
        run: |
          aws elasticbeanstalk create-environment \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-name ${{ env.EB_ENVIRONMENT_NAME }} \
            --solution-stack-name "64bit Amazon Linux 2023 v6.7.0 running Node.js 20" \
            --option-settings \
              Namespace=aws:autoscaling:launchconfiguration,OptionName=IamInstanceProfile,Value=aws-elasticbeanstalk-ec2-role \
              Namespace=aws:elasticbeanstalk:environment,OptionName=EnvironmentType,Value=SingleInstance \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=NODE_ENV,Value=production \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=PORT,Value=8080 \
            --version-label ${{ env.VERSION_LABEL }}

      - name: Deploy to Existing Environment
        if: steps.check-env.outputs.env_exists == 'true'
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-name ${{ env.EB_ENVIRONMENT_NAME }} \
            --version-label ${{ env.VERSION_LABEL }}

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for deployment to complete..."
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-names ${{ env.EB_ENVIRONMENT_NAME }}
          echo "Deployment completed!"

      - name: Get Environment URL
        run: |
          URL=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-names ${{ env.EB_ENVIRONMENT_NAME }} \
            --query 'Environments[0].CNAME' \
            --output text)
          echo "🚀 Application deployed to: http://$URL"
